# Nome da aplicaçăo
spring.application.name=Microservice Email

# Configuraçăo do servidor (porta)
server.port=8080

# Configuraçăo do banco de dados PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/emaildb
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuraçăo do JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuraçăo do envio de e-mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
